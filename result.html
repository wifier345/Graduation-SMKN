<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hasil pengumuman kelulusan" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Hasil Kelulusan — SMA Negeri 1 Contoh</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!-- School photo background (16:9) -->
  <div class="bg-photo" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <main class="card card--result" role="main" aria-label="Hasil Kelulusan" id="result-container">
    <!-- Loading state -->
    <div style="text-align:center; padding:24px 0;">
      <span class="spinner" style="width:28px;height:28px;border-color:rgba(56,189,248,0.2);border-top-color:var(--sky); display:inline-block;"></span>
      <p style="color:var(--text-dim); margin-top:16px; font-size:14px;">Memuat hasil...</p>
    </div>
  </main>

  <script src="./assets/script.js"></script>
</body>
</html>
